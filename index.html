<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0f1e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="LBO Model">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
  <title>LBO Model — Domino's</title>
</head>
<body>
  <div id="app">
    <header id="header">
      <div id="header-left">
        <div id="header-company">Domino's Pizza Group PLC</div>
        <div id="header-sub">LBO Model · Illustrative · June 2026</div>
      </div>
      <div id="header-badge">
        <span id="header-irr">18.6%</span>
        <span id="header-irr-label">Base IRR</span>
      </div>
    </header>

    <nav id="nav">
      <button class="nav-btn active" data-view="overview">Overview</button>
      <button class="nav-btn" data-view="returns">Returns</button>
      <button class="nav-btn" data-view="debt">Debt</button>
      <button class="nav-btn" data-view="sensitivity">Sensitivity</button>
    </nav>

    <main id="view-container"></main>
  </div>

  <div id="toast"></div>
  <script src="app.js"></script>
</body>
</html>
